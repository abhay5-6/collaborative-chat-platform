services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: rework
      POSTGRES_USER: rework
      POSTGRES_PASSWORD: rework_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rework -d rework"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql://rework:rework_password@postgres:5432/rework
      JWT_SECRET: change-me-before-deploy
      FRONTEND_URL: http://localhost:3000
      BACKEND_CORS_ORIGINS: http://localhost:3000
      WEBSOCKET_ALLOWED_ORIGINS: http://localhost:3000
      OLLAMA_GENERATE_URL: http://host.docker.internal:11434/api/generate
      EMBEDDING_MODEL_NAME: all-MiniLM-L6-v2
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      LOGIN_RATE_LIMIT: 5/minute
      REGISTER_RATE_LIMIT: 3/minute
      MESSAGE_RATE_LIMIT: 30/minute
      AI_RATE_LIMIT: 10/minute
      WEBSOCKET_MESSAGE_RATE_LIMIT: 200
      WEBSOCKET_RATE_LIMIT_WINDOW_SECONDS: 10
      WEBSOCKET_MAX_MESSAGE_LENGTH: 50000
      OLLAMA_TIMEOUT_SECONDS: 30
      MEMORY_MIN_IMPORTANCE_SCORE: 3
      MEMORY_MIN_CONTENT_LENGTH: 24
      MEMORY_MAX_CONTENT_LENGTH: 4000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
